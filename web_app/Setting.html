<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Share/global.css">
    <link rel="stylesheet" href="./page/Setting/Setting.css">
    <title>Document</title>
</head>

<body>
    <div class="app-layout">

        <aside id="sidebar-container" class="roSidebar"></aside>

        <div class="right-content">

            <header id="header-container" class="roHeader"></header>

            <main class="main-content">
                <div id="device_identify" class="setting_box">
                    <h3>Device Identify</h3>
                    <div id="device_name">
                        <label for="device_name_input">Device Name:</label>
                        <div id="device_name_input_container">
                            <input type="text" id="device_name_input" name="device_name_input" disabled>
                            <button id="edit_device_name" class="edit-btn"><svg width="24px" height="24px"
                                    viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M15.4998 5.49994L18.3282 8.32837M3 20.9997L3.04745 20.6675C3.21536 19.4922 3.29932 18.9045 3.49029 18.3558C3.65975 17.8689 3.89124 17.4059 4.17906 16.9783C4.50341 16.4963 4.92319 16.0765 5.76274 15.237L17.4107 3.58896C18.1918 2.80791 19.4581 2.80791 20.2392 3.58896C21.0202 4.37001 21.0202 5.63634 20.2392 6.41739L8.37744 18.2791C7.61579 19.0408 7.23497 19.4216 6.8012 19.7244C6.41618 19.9932 6.00093 20.2159 5.56398 20.3879C5.07171 20.5817 4.54375 20.6882 3.48793 20.9012L3 20.9997Z"
                                        stroke="#000000" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg></button>
                        </div>
                    </div>
                    <div id="IDnIP">
                        <div id="ID">
                            <label>ID:</label>
                            <input type="text" id="deviceId" value="DESKTOP-88927" readonly />
                        </div>
                        <div id="IP">
                            <label>Local IP:</label>
                            <input type="text" id="deviceIp" value="192.168.1.52" readonly />
                        </div>
                    </div>

                </div>
                <div id="audio" class="setting_box">
                    <h3>Audio</h3>
                    <div ID="audio_out_put">
                        <label for="output_device">Output Routing</label>
                        <select id="output_device">
                            <option>Loading devices...</option>
                        </select>
                    </div>
                    <div ID="volume">
                        <label>Volume</label>
                        <div class="volume_container">
                            <button id="mute_toggle_btn" class="icon-btn">
                                <svg id="vol_icon" width="24px" height="24px" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M18 9.00009C18.6277 9.83575 18.9996 10.8745 18.9996 12.0001C18.9996 13.1257 18.6277 14.1644 18 15.0001M6.6 9.00009H7.5012C8.05213 9.00009 8.32759 9.00009 8.58285 8.93141C8.80903 8.87056 9.02275 8.77046 9.21429 8.63566C9.43047 8.48353 9.60681 8.27191 9.95951 7.84868L12.5854 4.69758C13.0211 4.17476 13.2389 3.91335 13.4292 3.88614C13.594 3.86258 13.7597 3.92258 13.8712 4.04617C14 4.18889 14 4.52917 14 5.20973V18.7904C14 19.471 14 19.8113 13.8712 19.954C13.7597 20.0776 13.594 20.1376 13.4292 20.114C13.239 20.0868 13.0211 19.8254 12.5854 19.3026L9.95951 16.1515C9.60681 15.7283 9.43047 15.5166 9.21429 15.3645C9.02275 15.2297 8.80903 15.1296 8.58285 15.0688C8.32759 15.0001 8.05213 15.0001 7.5012 15.0001H6.6C6.03995 15.0001 5.75992 15.0001 5.54601 14.8911C5.35785 14.7952 5.20487 14.6422 5.10899 14.4541C5 14.2402 5 13.9601 5 13.4001V10.6001C5 10.04 5 9.76001 5.10899 9.54609C5.20487 9.35793 5.35785 9.20495 5.54601 9.10908C5.75992 9.00009 6.03995 9.00009 6.6 9.00009Z"
                                        stroke="#000000" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </button>
                            <input type="range" id="volume_slider" min="0" max="100" value="100">
                            <span id="volume_text">100%</span>
                        </div>
                    </div>
                </div>
                <div id="stream_performance" class="setting_box">
                    <h3>Stream Performance</h3>
                    <div id="stream_performance_container">
                        <div id="fps">
                            <label>FPS</label>
                            <div id="fpsoptions" class="fps-selector">
                                <input type="radio" id="fps_30" name="fps" value="30">
                                <label for="fps_30">30</label>

                                <input type="radio" id="fps_60" name="fps" value="60" checked>
                                <label for="fps_60">60</label>

                                <input type="radio" id="fps_120" name="fps" value="120">
                                <label for="fps_120">120</label>
                            </div>
                        </div>

                        <div id="Display_Resolution">
                            <label for="resolution_select">Display Resolution</label>
                            <select id="resolution_select">
                                <option>Loading resolutions...</option>
                            </select>
                        </div>
                    </div>

                    <div id="bitrate">
                        <label for="bitrate_slider">Bitrate Allocation: </label>
                        <span id="bitrate_text">1 mbps</span>
                        <div id="bitrateoptions" class="bitrate-container">
                            <input type="range" id="bitrate_slider" min="1" max="50" step="0.5" value="1">
                        </div>
                    </div>
                </div>
                <div id="theme" class="setting_box">
                    <h3>Theme</h3>

                    <div class="theme-container">
                        <div class="theme-option-container">
                            <label for="theme_light" id="light_mode" class="theme-option">
                                <input type="radio" id="theme_light" name="app_theme" value="light" checked>
                                <div class="theme-content">
                                    <svg fill="#000000" width="24px" height="24px" viewBox="-5.5 0 32 32" version="1.1"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M11.875 6v2.469c0 0.844-0.375 1.25-1.156 1.25s-1.156-0.406-1.156-1.25v-2.469c0-0.813 0.375-1.219 1.156-1.219s1.156 0.406 1.156 1.219zM14.219 9.25l1.438-2.031c0.469-0.625 1.063-0.75 1.656-0.313s0.656 1 0.188 1.688l-1.438 2c-0.469 0.688-1.031 0.75-1.656 0.313-0.594-0.438-0.656-0.969-0.188-1.656zM5.781 7.25l1.469 2c0.469 0.688 0.406 1.219-0.219 1.656-0.594 0.469-1.156 0.375-1.625-0.313l-1.469-2c-0.469-0.688-0.406-1.219 0.219-1.656 0.594-0.469 1.156-0.375 1.625 0.313zM10.719 11.125c2.688 0 4.875 2.188 4.875 4.875 0 2.656-2.188 4.813-4.875 4.813s-4.875-2.156-4.875-4.813c0-2.688 2.188-4.875 4.875-4.875zM1.594 11.813l2.375 0.75c0.781 0.25 1.063 0.719 0.813 1.469-0.219 0.75-0.75 0.969-1.563 0.719l-2.313-0.75c-0.781-0.25-1.063-0.75-0.844-1.5 0.25-0.719 0.75-0.938 1.531-0.688zM17.5 12.563l2.344-0.75c0.813-0.25 1.313-0.031 1.531 0.688 0.25 0.75-0.031 1.25-0.844 1.469l-2.313 0.781c-0.781 0.25-1.281 0.031-1.531-0.719-0.219-0.75 0.031-1.219 0.813-1.469zM10.719 18.688c1.5 0 2.719-1.219 2.719-2.688 0-1.5-1.219-2.719-2.719-2.719s-2.688 1.219-2.688 2.719c0 1.469 1.188 2.688 2.688 2.688zM0.906 17.969l2.344-0.75c0.781-0.25 1.313-0.063 1.531 0.688 0.25 0.75-0.031 1.219-0.813 1.469l-2.375 0.781c-0.781 0.25-1.281 0.031-1.531-0.719-0.219-0.75 0.063-1.219 0.844-1.469zM18.219 17.219l2.344 0.75c0.781 0.25 1.063 0.719 0.813 1.469-0.219 0.75-0.719 0.969-1.531 0.719l-2.344-0.781c-0.813-0.25-1.031-0.719-0.813-1.469 0.25-0.75 0.75-0.938 1.531-0.688zM3.938 23.344l1.469-1.969c0.469-0.688 1.031-0.781 1.625-0.313 0.625 0.438 0.688 0.969 0.219 1.656l-1.469 1.969c-0.469 0.688-1.031 0.813-1.656 0.375-0.594-0.438-0.656-1.031-0.188-1.719zM16.063 21.375l1.438 1.969c0.469 0.688 0.406 1.281-0.188 1.719s-1.188 0.281-1.656-0.344l-1.438-2c-0.469-0.688-0.406-1.219 0.188-1.656 0.625-0.438 1.188-0.375 1.656 0.313zM11.875 23.469v2.469c0 0.844-0.375 1.25-1.156 1.25s-1.156-0.406-1.156-1.25v-2.469c0-0.844 0.375-1.25 1.156-1.25s1.156 0.406 1.156 1.25z">
                                        </path>
                                    </svg>
                                    <span>Light Mode</span>
                                </div>
                            </label></div>
                        <div class="theme-option-container">
                            <label for="theme_dark" id="dark_mode" class="theme-option">
                                <input type="radio" id="theme_dark" name="app_theme" value="dark">
                                <div class="theme-content">
                                    <svg fill="#000000" width="24px" height="24px" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <g id="Dark">
                                            <path
                                                d="M12.741,20.917a9.389,9.389,0,0,1-1.395-.105,9.141,9.141,0,0,1-1.465-17.7,1.177,1.177,0,0,1,1.21.281,1.273,1.273,0,0,1,.325,1.293,8.112,8.112,0,0,0-.353,2.68,8.266,8.266,0,0,0,4.366,6.857,7.628,7.628,0,0,0,3.711.993,1.242,1.242,0,0,1,.994,1.963h0A9.148,9.148,0,0,1,12.741,20.917ZM10.261,4.05a.211.211,0,0,0-.065.011,8.137,8.137,0,1,0,9.131,12.526h0a.224.224,0,0,0,.013-.235.232.232,0,0,0-.206-.136A8.619,8.619,0,0,1,14.946,15.1a9.274,9.274,0,0,1-4.883-7.7,9.123,9.123,0,0,1,.4-3.008.286.286,0,0,0-.069-.285A.184.184,0,0,0,10.261,4.05Z" />
                                        </g>
                                    </svg>
                                    <span>Dark Mode</span>
                                </div>
                        </div>
                        </label>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="./Share/LoadComponent.js"></script>
    <script src="./page/Setting/Setting.js"></script>
</body>

</html>
